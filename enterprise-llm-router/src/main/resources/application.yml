server:
  port: 8080

# PoC: DB and provider configs
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:llm_router}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

# Spring AI / OpenAI settings (use environment variable OPENAI_API_KEY)
spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}

# ChatMemory is used for conversation history (in-memory by default). PostgreSQL is
# reserved for metadata (ConversationMetadata) and Phase-2 RAG documents.
